<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Prevents pinching, zooming, and scrolling bounce on mobile -->
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRIME TENNIS</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            /* Crucial: Stops the phone from handling gestures like swipe-to-refresh */
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            /* Holds the viewport locked in place */
        }

        /* Full Screen Overlay Backdrop System */
        #menuContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #12131a 0%, #050508 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* Prime Tennis Main Branding Header */
        .prime-title {
            color: #00ffff;
            font-size: 8vw;
            /* Scales elegantly based on landscape screen width */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0 0 5px 0;
            text-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
        }

        .prime-credit {
            color: #fff;
            font-size: 2.5vw;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 5vh;
            opacity: 0.7;
        }

        /* CSS Loading Progress Bar Framework */
        #loadingWrapper {
            width: 40%;
            height: 6px;
            background-color: #222;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        #loadingBar {
            width: 0%;
            height: 100%;
            background-color: #00ffff;
            box-shadow: 0 0 10px #00ffff;
        }

        /* Difficulty Mode Selection Container */
        #selectionView {
            display: none;
            flex-direction: row;
            /* Arranges buttons side-by-side to match horizontal look */
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .menu-btn {
            padding: 12px 30px;
            font-size: 2vw;
            font-weight: bold;
            cursor: pointer;
            color: white;
            border: none;
            border-radius: 8px;
            width: 22vw;
            transition: transform 0.1s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        #easyBtn {
            background: #4CAF50;
        }

        #medBtn {
            background: #FF9800;
        }

        #hardBtn {
            background: #f44336;
        }

        /* HUD Controller Utility Button */
        #changeModeBtn {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            background-color: #222;
            color: #00ffff;
            border: 2px solid #00ffff;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.5vw;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            z-index: 10;
        }

        /* FIT TO SCREEN WINDOW MANAGEMENT */
        .canvas-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        canvas {
            background-color: #000;
            border: 2px solid #333;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* Locks dimensions into perfect aspect ratio */
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <!-- Main Entry Backdrop Menu -->
    <div id="menuContainer">
        <h1 class="prime-title">PRIME TENNIS</h1>
        <div class="prime-credit">by richie prime designs</div>

        <!-- Animated Loader Container -->
        <div id="loadingWrapper">
            <div id="loadingBar"></div>
        </div>

        <!-- Dynamic Selection Block Context -->
        <div id="selectionView">
            <button id="easyBtn" class="menu-btn" onclick="startGame('easy')">EASY MODE</button>
            <button id="medBtn" class="menu-btn" onclick="startGame('medium')">MEDIUM MODE</button>
            <button id="hardBtn" class="menu-btn" onclick="startGame('hard')">HARD MODE</button>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="pongCanvas" width="800" height="400"></canvas>
    </div>

    <!-- Live HUD Interactivity Control Trigger -->
    <button id="changeModeBtn" onclick="returnToMenu()">⚙️ CHANGE MODE</button>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");
        const bgMusic = document.getElementById("bgMusic");

        // Game State Control Engines
        let isGameStarted = false;
        let isGameOver = false;
        let finalWinnerName = "";

        // Dynamic Configuration Parameters
        let aiReactionDelay = 12;
        let aiMistakeChance = 2;
        let aiCurrentSpeed = 6;
        let currentLevelLabel = "MEDIUM";

        // Global Actors
        const player = { x: 15, y: 160, width: 12, height: 80, score: 0 };
        const ai = {
            x: 773,
            y: 160,
            width: 12,
            height: 80,
            score: 0,
            frameCount: 0,
            isMakingMistake: false
        };
        const ball = { x: 400, y: 200, radius: 8, speedX: 0, speedY: 0 };

        // --- SCREEN AUTOMATION ORIENTATION LOCK ---
        function requestLandscape() {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch((err) => {
                    console.log("Orientation lock handled dynamically:", err);
                });
            }
        }

        // --- AUTOMATED INITIAL SPLASH SEQUENCE LOADER ---
        window.addEventListener("DOMContentLoaded", () => {
            requestLandscape();
            const bar = document.getElementById("loadingBar");
            const loader = document.getElementById("loadingWrapper");
            const selection = document.getElementById("selectionView");
            let widthValue = 0;

            const loadingInterval = setInterval(() => {
                if (widthValue >= 100) {
                    clearInterval(loadingInterval);
                    loader.style.display = "none";
                    selection.style.display = "flex";
                } else {
                    widthValue += 2;
                    bar.style.width = widthValue + "%";
                }
            }, 30);
        });

        // Try to force rotation on first user touch as a fallback safety net
        window.addEventListener("touchstart", requestLandscape, { once: true });

        // --- ADVANCED TOUCH INTERACTION ENGINE (NO REFRESHING) ---
        function handlePaddleMove(clientY) {
            if (!isGameStarted || isGameOver) return;
            let rect = canvas.getBoundingClientRect();
            let scaleY = canvas.height / rect.height;
            // Map the touch movement cleanly within the bounds of the scaled game canvas
            player.y = (clientY - rect.top) * scaleY - player.height / 2;
        }

        canvas.addEventListener("mousemove", (e) => {
            handlePaddleMove(e.clientY);
        });

        // passive: false tells mobile explicitly that we are overriding default scrolling/refreshing rules
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); }, { passive: false });
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                handlePaddleMove(e.touches[0].clientY);
            }
        }, { passive: false });

        // --- RUNTIME STATE INITIALIZATION CONTROLLERS ---
        function startGame(level) {
            currentLevelLabel = level.toUpperCase();
            requestLandscape();

            if (level === 'easy') {
                aiReactionDelay = 22;
                aiMistakeChance = 4.5;
                aiCurrentSpeed = 3.5;
            } else if (level === 'medium') {
                aiReactionDelay = 14;
                aiMistakeChance = 2.0;
                aiCurrentSpeed = 5.5;
            } else if (level === 'hard') {
                aiReactionDelay = 4;
                aiMistakeChance = 0.0;
                aiCurrentSpeed = 8.5;
            }

            player.score = 0;
            ai.score = 0;
            player.y = 160;
            ai.y = 160;
            isGameOver = false;

            document.getElementById('menuContainer').style.display = 'none';
            bgMusic.play().catch(() => { });

            launchBall();
            isGameStarted = true;
        }

        function returnToMenu() {
            isGameStarted = false;
            const titleEl = document.querySelector('.prime-title');
            titleEl.textContent = "SWAP MODE";

            document.getElementById('loadingWrapper').style.display = "none";
            document.getElementById('selectionView').style.display = "flex";
            document.getElementById('menuContainer').style.display = 'flex';
        }

        function launchBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = Math.random() > 0.5 ? 6 : -6;
            ball.speedY = (Math.random() * 2 - 1) * 4;
        }

        // --- CORE LOGIC ENGINE ---
        function update() {
            if (!isGameStarted || isGameOver) return;

            ball.x += ball.speedX;
            ball.y += ball.speedY;

            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.speedY = -ball.speedY;
            } else if (ball.y + ball.radius > canvas.height) {
                ball.y = canvas.height - ball.radius;
                ball.speedY = -ball.speedY;
            }

            ai.frameCount++;
            if (ai.frameCount % aiReactionDelay === 0) {
                let diceRoll = Math.random() * 10;
                ai.isMakingMistake = (diceRoll < aiMistakeChance);
            }

            if (!ai.isMakingMistake) {
                let aiPaddleCenter = ai.y + ai.height / 2;
                if (aiPaddleCenter < ball.y - 15) {
                    ai.y += aiCurrentSpeed;
                } else if (aiPaddleCenter > ball.y + 15) {
                    ai.y -= aiCurrentSpeed;
                }
            }

            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
            ai.y = Math.max(0, Math.min(canvas.height - ai.height, ai.y));

            if (ball.x < 0) {
                ai.score++;
                checkScoreLimits();
                if (!isGameOver) launchBall();
            } else if (ball.x > canvas.width) {
                player.score++;
                checkScoreLimits();
                if (!isGameOver) launchBall();
            }

            if (ball.speedX < 0 && ball.x - ball.radius <= player.x + player.width && ball.x >= player.x) {
                if (ball.y >= player.y && ball.y <= player.y + player.height) {
                    ball.speedX = -ball.speedX;
                    let deltaY = ball.y - (player.y + player.height / 2);
                    ball.speedY = deltaY * 0.25;
                }
            }

            if (ball.speedX > 0 && ball.x + ball.radius >= ai.x && ball.x <= ai.x + ai.width) {
                if (ball.y >= ai.y && ball.y <= ai.y + ai.height) {
                    ball.speedX = -ball.speedX;
                    let deltaY = ball.y - (ai.y + ai.height / 2);
                    ball.speedY = deltaY * 0.25;
                }
            }
        }

        function checkScoreLimits() {
            if (player.score >= 10) {
                isGameOver = true;
                finalWinnerName = "YOU WIN!";
            } else if (ai.score >= 10) {
                isGameOver = true;
                finalWinnerName = "AI WINS!";
            }
        }

        // --- GRAPHICS GRAPHICS GENERATOR ---
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRect(0, 0, canvas.width, canvas.height, "#000");

            for (let i = 0; i < canvas.height; i += 25) {
                drawRect(canvas.width / 2 - 1, i, 2, 12, "#1c1d24");
            }

            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            ctx.font = "bold 44px monospace";
            ctx.fillText(player.score, canvas.width / 4, 65);
            ctx.fillText(ai.score, (3 * canvas.width) / 4, 65);

            ctx.font = "12px Arial";
            ctx.fillStyle = "rgba(0, 255, 255, 0.4)";
            ctx.fillText("MODE: " + currentLevelLabel, 25, 30);

            drawRect(player.x, player.y, player.width, player.height, "cyan");
            drawRect(ai.x, ai.y, ai.width, ai.height, "magenta");

            if (!isGameOver) {
                drawCircle(ball.x, ball.y, ball.radius, "white");
            } else {
                drawRect(0, 0, canvas.width, canvas.height, "rgba(0,0,0,0.85)");

                ctx.fillStyle = finalWinnerName === "YOU WIN!" ? "#00ffff" : "#f44336";
                ctx.font = "bold 50px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(finalWinnerName, canvas.width / 2, canvas.height / 2 - 10);

                ctx.fillStyle = "#ffffff";
                ctx.font = "16px Arial";
                ctx.fillText("Click 'CHANGE MODE' below to start fresh!", canvas.width / 2, canvas.height / 2 + 40);
                ctx.textAlign = "start";
            }
        }

        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>

</html>
