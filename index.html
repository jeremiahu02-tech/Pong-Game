<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human vs AI: Pong</title>
    <style>
        body {
            background-color: #111;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        canvas {
            background-color: #000;
            border: 4px solid white;
            display: block;
            margin: 20px auto;
        }
    </style>
</head>

<body>

    <h1>PONG CHALLENGE | YOU VS AI</h1>
    <p>Move your mouse up and down to control the left paddle!</p>
    <canvas id="pongCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");

        // Game Objects
        const player = { x: 10, y: 150, width: 10, height: 80, score: 0 };
        const ai = {
            x: 780,
            y: 150,
            width: 10,
            height: 80,
            score: 0,
            speed: 6,          // High speed makes it fast...
            frameCount: 0,     // We will use this to count frames for the delay
            isMakingMistake: false // Keeps track of whether the AI is currently confused
        };
        const ball = { x: 400, y: 200, radius: 8, speedX: 5, speedY: 5 };

        // Track Mouse Movement for Human Player
        canvas.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            player.y = e.clientY - rect.top - player.height / 2;
        });

        // DRAW FUNCTIONS
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawText(text, x, y) {
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.fillText(text, x, y);
        }

        // RESET BALL WHEN SOMEONE SCORES
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = -ball.speedX; // Send it to the other player
        }

        // THE UPDATE LOGIC ENGINE
        function update() {
            // 1. Move the ball
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // 2. Ball bouncing off top and bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.speedY = -ball.speedY;
            }

            // 3. AI TRACKING LOGIC (The Brain)
            // 3. AI TRACKING LOGIC (With Delay and Mistakes)
            ai.frameCount++;

            // A. REACTION DELAY: Only make a decision every 12 frames (approx. 5 times a second)
            if (ai.frameCount % 12 === 0) {

                // B. MISTAKE LOGIC: Roll a virtual 10-sided die. 
                // Math.random() gives a number between 0 and 1. Multiply by 10 to get 0-10.
                let diceRoll = Math.random() * 10;

                if (diceRoll < 2) {
                    // If the roll is less than 2 (a 20% chance), the AI gets confused!
                    ai.isMakingMistake = true;
                } else {
                    // 80% of the time, the AI focuses and plays normally
                    ai.isMakingMistake = false;
                }
            }

            // C. MOVEMENT EXECUTION
            // If the AI is NOT making a mistake, it chases the ball normally
            if (ai.isMakingMistake === false) {
                let aiPaddleCenter = ai.y + ai.height / 2;
                if (aiPaddleCenter < ball.y - 10) {
                    ai.y += ai.speed; // Chase downward
                } else if (aiPaddleCenter > ball.y + 10) {
                    ai.y -= ai.speed; // Chase upward
                }
            } else {
                // If it IS making a mistake, it just stands still or twitches slightly!
                // This gives the human player an opening to score.
            }

            // 4. Scoring conditions
            if (ball.x < 0) {
                ai.score++;
                resetBall();
            } else if (ball.x > canvas.width) {
                player.score++;
                resetBall();
            }

            // 5. Basic Paddle Collision (Simple detection)
            let currentPaddle = (ball.x < canvas.width / 2) ? player : ai;

            if (ball.x > currentPaddle.x && ball.x < currentPaddle.x + currentPaddle.width) {
                if (ball.y > currentPaddle.y && ball.y < currentPaddle.y + currentPaddle.height) {
                    ball.speedX = -ball.speedX;
                }
            }
        }

        // THE RENDER ENGINE
        function render() {
            // Clear the board
            drawRect(0, 0, canvas.width, canvas.height, "#000");

            // Draw center net line
            for (let i = 0; i < canvas.height; i += 20) {
                drawRect(canvas.width / 2 - 1, i, 2, 10, "#333");
            }

            // Draw Scores
            drawText(player.score, canvas.width / 4, 50);
            drawText(ai.score, (3 * canvas.width) / 4, 50);

            // Draw Paddles and Ball
            drawRect(player.x, player.y, player.width, player.height, "cyan");
            drawRect(ai.x, ai.y, ai.width, ai.height, "magenta");
            drawCircle(ball.x, ball.y, ball.radius, "white");
        }

        // THE GAME LOOP
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Start the loop
        gameLoop();
    </script>
</body>

</html>
